name: Sync calendar

on:
  schedule:
    - cron: "0 20 * * *"    # 20:00 UTC → 05:00 KST, once a day
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-calendar
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch & transform calendar
        env:
          ICAL_URL: ${{ secrets.ICAL_URL }}
        run: node scripts/fetch-calendar.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/calendar.json)" ]]; then
            git config user.name  "calendar-bot"
            git config user.email "calendar-bot@users.noreply.github.com"
            git add public/calendar.json
            git commit -m "chore(calendar): hourly sync"
            git pull --rebase origin main
            git push
          else
            echo "no changes"
          fi
